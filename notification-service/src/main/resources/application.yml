server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USERNAME:bookstore}
    password: ${DB_PASSWORD:bookstore}
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

bookstore:
  rabbitmq:
    exchange: bookstore.events
    order-created-queue: notification.order.created
    payment-completed-queue: notification.payment.completed
    order-created-routing-key: order.created
    payment-completed-routing-key: payment.completed

management:
  endpoints:
    web:
      exposure:
        include: health,info
