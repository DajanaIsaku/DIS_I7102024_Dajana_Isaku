name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: '21'

jobs:
  # Development pipeline: build and test on every push/PR
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Build step: compile all Maven modules
      - name: Build project
        run: mvn -B clean compile

      # Test step: run unit and integration tests
      - name: Run tests
        run: mvn -B test

      # Package step: create executable JARs for all services
      - name: Package services
        run: mvn -B package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            discovery-server/target/*.jar
            config-server/target/*.jar
            api-gateway/target/*.jar
            user-service/target/*.jar
            book-service/target/*.jar
            order-service/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar

  # Docker build step: optional image creation (development/staging)
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    strategy:
      matrix:
        service:
          - discovery-server
          - config-server
          - api-gateway
          - user-service
          - book-service
          - order-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package services for Docker
        run: mvn -B package -DskipTests

      - name: Build Docker image
        run: docker build -f ${{ matrix.service }}/Dockerfile -t bookstore/${{ matrix.service }}:latest .

  # Production deployment stage (placeholder)
  # In production, this job would deploy to a target environment (e.g. Kubernetes)
  # after manual approval and using environment-specific secrets.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Production deployment placeholder
        run: |
          echo "Production deployment would run here."
          echo "Examples: push images to container registry, apply Kubernetes manifests,"
          echo "or trigger a deployment pipeline for the production environment."
